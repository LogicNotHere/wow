services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wowshop-api
    command: sh -c "uvicorn wow_shop.app:app --host ${APP_HOST} --port ${APP_PORT} --reload"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - .:/app

  postgres:
    image: postgres:16-alpine
    container_name: wowshop-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
