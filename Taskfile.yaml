version: '3'

vars:
  COMPOSE: docker compose
  API_SERVICE: api
  DB_SERVICE: postgres
  APP_PACKAGE: wow_shop
  API_EXEC: '{{.COMPOSE}} exec {{.API_SERVICE}}'
  API_RUN: '{{.COMPOSE}} run --rm --no-deps {{.API_SERVICE}}'
  ALEMBIC_EXEC: '{{.API_EXEC}} alembic'

tasks:
  default:
    desc: Start server task
    cmds:
      - task: server

  server:
    desc: Start api + postgres in detached mode
    cmds:
      - '{{.COMPOSE}} up -d'

  build:
    desc: Build docker images
    cmds:
      - '{{.COMPOSE}} build'

  isort:
    desc: Run isort inside api container
    cmds:
      - '{{.API_RUN}} isort --settings-path pyproject.toml {{.APP_PACKAGE}}'

  black:
    desc: Run black formatter inside api container
    cmds:
      - '{{.API_RUN}} black --config=pyproject.toml {{.APP_PACKAGE}}'

  flake8:
    desc: Run flake8 inside api container
    cmds:
      - '{{.API_RUN}} flake8 --config=.flake8 {{.APP_PACKAGE}}'

  mypy:
    desc: Run mypy inside api container
    cmds:
      - '{{.API_RUN}} mypy --config-file=mypy.ini {{.APP_PACKAGE}}'

  pre-commit:
    desc: Run isort + black + flake8 + mypy
    deps: [build]
    cmds:
      - task: isort
      - task: black
      - task: flake8
      - task: mypy

  down:
    desc: Stop and remove containers
    cmds:
      - '{{.COMPOSE}} down'

  init_db:
    desc: Reset local DB volume, start postgres, apply migrations, leave seed as TODO
    cmds:
      - '{{.COMPOSE}} down -v'
      - '{{.COMPOSE}} up -d {{.DB_SERVICE}}'
      - '{{.COMPOSE}} up -d {{.API_SERVICE}}'
      - '{{.ALEMBIC_EXEC}} upgrade head'
      - '{{.API_EXEC}} sh -c "echo TODO add seed command when initial data exists"'

  restart:
    desc: Restart running services
    cmds:
      - '{{.COMPOSE}} restart'

  logs:
    desc: Placeholder logs task (set concrete stream later)
    cmds:
      - '{{.API_EXEC}} sh -c "echo TODO set logs command (for example docker compose logs -f api)"'

  ps:
    desc: Show compose services status
    cmds:
      - '{{.COMPOSE}} ps'

  shell:
    desc: Open shell inside api container
    cmds:
      - '{{.API_EXEC}} sh'

  test:
    desc: Placeholder for tests inside api container
    cmds:
      - '{{.API_EXEC}} sh -c "echo TODO add test command (pytest or equivalent)"'
      
#Alembic
  migrate:
    desc: Apply all migrations (upgrade head)
    cmds:
      - '{{.ALEMBIC_EXEC}} upgrade head'

  makemigrations:
    desc: Generate migration (MSG="message")
    cmds:
      - '{{.API_EXEC}} sh -c ''alembic revision --autogenerate -m "${MSG:-migration}"'''

  downgrade:
    desc: Downgrade one revision
    cmds:
      - '{{.ALEMBIC_EXEC}} downgrade -1'

  current:
    desc: Show current migration revision
    cmds:
      - '{{.ALEMBIC_EXEC}} current'

  history:
    desc: Show migration history
    cmds:
      - '{{.ALEMBIC_EXEC}} history'
